# render.yaml — optional Render blueprint for the backend.
# Place this at the repo root (or in afya-backend) and use Render's "Blueprint" deploy.
services:
  - type: web
    name: afya-api
    env: node
    rootDir: afya-backend
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: afya-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true        # Render generates a strong secret
      - key: DB_PATH
        value: /data/afya.db
      - key: CORS_ORIGIN
        sync: false                # set to your frontend URL in the dashboard
